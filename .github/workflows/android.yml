name: Android CI

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx8g -Dorg.gradle.daemon=true -Dkotlin.daemon.jvmargs=-Xmx4g

jobs:
  build:
    runs-on: [ubuntu-latest]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "jetbrains"
          java-version: 25
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/develop' && github.ref != 'refs/heads/release' }}
          gradle-home-cache-cleanup: true

      - name: Setup release signing
        if: github.event.inputs.build_type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > signing.jks
          cat > signing.properties << EOF
          storeFile=signing.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build with Gradle
        env:
          BUILD_NUMBER: ${{github.run_number}}
          BUILD_VERSION: ${{github.ref_name}}
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew :app:assembleRelease --stacktrace --parallel --build-cache --configuration-cache
          else
            ./gradlew :app:assembleDebug --stacktrace --parallel --build-cache --configuration-cache
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Flare-${{ github.event.inputs.build_type }}-${{ github.run_number }}
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/bundle/**/*.aab
          if-no-files-found: warn

      - name: Remove signing credentials
        if: always()
        run: rm -f signing.jks signing.properties
